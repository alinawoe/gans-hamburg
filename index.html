<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gans Hamburg - Die Schnitzeljagd</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        /* CSS für Vollbild-Ansicht ohne Scrollen auf mobilen Geräten */
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh; /* Verwendet die dynamische Höhe, falls verfügbar */
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f2eb; /* Pastell-Beige */
        }

        /* Hintergrundbild-Klasse */
        .bg-full-cover {
            background-image: url('Design Gans Hamburg 1.jpg'); /* Pfad zum Start-Hintergrundbild */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            width: 100%;
            height: 100%;
        }

        /* Utility-Klassen */
        .view-hidden {
            display: none !important;
        }
        
        .flex-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        /* Animation für das Ausfaden */
        @keyframes fade-out {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        .animate-fade-out {
            animation: fade-out 0.5s ease-out forwards;
        }

        /* Animation für das Einfaden */
        @keyframes fade-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-in forwards;
        }
    </style>
</head>
<body>

    <div id="view-start" class="bg-full-cover flex-center relative">
        <button onclick="startFirstAnimation()" 
                style="letter-spacing: -0.04em;"
                class="px-12 py-5 bg-[#e3ded2] text-[#2c4c38] font-bold text-2xl rounded-none border-none shadow-lg uppercase active:scale-95 transition-transform">
            START
        </button>
    </div>

    <div id="view-animation" class="view-hidden w-full h-full bg-[#f5f2eb] relative flex flex-col justify-between">
        <div class="absolute inset-0 z-0">
            <img id="animation-image" src="gans_tanzt.gif" alt="Anleitungs-Gans tanzend" class="w-full h-full object-contain">
        </div>
        
        <div class="relative z-10 w-full h-full flex flex-col justify-center items-center space-y-8 px-6 pb-20">
            <div id="animation-text-box" class="text-center">
                <p id="animation-text" class="text-[#2c4c38] font-black text-3xl tracking-wide uppercase">
                    Los geht's!
                </p>
            </div>
            
            <button id="btn-intro-continue" onclick="showIntroView()" 
                    style="letter-spacing: -0.04em;"
                    class="view-hidden px-10 py-4 bg-[#2c4c38] text-white font-bold text-xl rounded-xl shadow-lg uppercase active:scale-95 transition-transform">
                Ja, los geht's!
            </button>
        </div>
    </div>

    <div id="view-intro" class="view-hidden w-full h-full bg-[#f5f2eb] flex flex-col justify-between p-6">
        <div class="w-full flex flex-col items-center mt-4">
            <div class="w-28 h-28 mb-3">
                <img src="gans_anleitung.png" alt="Anleitungs-Gans Avatar" class="w-full h-full object-contain">
            </div>
            <h1 class="text-3xl font-black text-[#2c4c38] tracking-tight uppercase">Moini, Luca!</h1>
        </div>

        <div class="w-full flex-1 flex flex-col justify-end my-4 max-w-md mx-auto">
            <div id="chat-container" class="space-y-3 overflow-y-auto max-h-[40vh] pr-1 flex flex-col">
            </div>
        </div>

        <div class="w-full max-w-md mx-auto space-y-4 pb-6">
            <div id="intro-input-container" class="w-full">
                <input id="intro-input" type="text" placeholder="Deine Antwort (z.B. Ja!)..." class="w-full bg-white border-2 border-[#b2cfb6] rounded-xl px-4 py-3 text-center text-lg text-slate-800 focus:outline-none focus:border-[#2c4c38] shadow-sm">
            </div>
            <button id="btn-intro-submit" onclick="handleIntroResponse()" class="w-full py-4 bg-[#2c4c38] text-white font-bold text-lg rounded-xl shadow-md active:scale-[0.98] transition-transform uppercase tracking-wider">
                Abschicken
            </button>
        </div>
    </div>

    <div id="view-puzzle" class="view-hidden w-full h-full bg-[#f5f2eb] flex flex-col justify-between p-6">
        
        <div class="w-full flex flex-col items-center">
            <div class="w-full text-center py-2 mb-2">
                <span id="puzzle-progress" class="text-xs font-bold tracking-wider text-[#2c4c38] uppercase bg-[#e3ded2] px-3 py-1 rounded-full">Rätsel 1 von 2</span>
            </div>
            
            <div class="w-full max-w-[320px] aspect-square bg-white border-4 border-[#b2cfb6] rounded-xl shadow-inner overflow-hidden flex items-center justify-center">
                <img id="puzzle-image" src="raetsel1.jpg" alt="Rätsel Bild" class="w-full h-full object-cover">
            </div>
        </div>

        <div class="w-full flex-1 flex flex-col justify-center my-4 max-w-md mx-auto space-y-4">
            <p id="puzzle-question" class="text-[#2c4c38] font-semibold text-lg text-center px-2 leading-relaxed">
                An welcher berühmten Hamburger Alster-Brücke startet unsere heute Tour?
            </p>

            <div class="w-full">
                <input id="puzzle-input" type="text" placeholder="Deine Antwort..." class="w-full bg-white border-2 border-[#b2cfb6] rounded-xl px-4 py-3 text-center text-lg text-slate-800 focus:outline-none focus:border-[#2c4c38] shadow-sm">
            </div>

            <div id="feedback-box" class="w-full bg-[#faefe0] border border-[#e6d5bd] rounded-xl p-3 text-center text-sm text-[#7c5e39] font-medium hidden">
            </div>
        </div>

        <div class="w-full max-w-md mx-auto pb-12">
            <button onclick="checkAnswer()" class="w-full py-4 bg-[#2c4c38] text-white font-bold text-lg rounded-xl shadow-md active:scale-[0.98] transition-transform uppercase tracking-wider">
                Gans sicher!
            </button>
        </div>
    </div>

    <div id="view-success" class="view-hidden w-full h-full bg-[#b2cfb6] flex-center p-6 text-center">
        <h1 class="text-2xl md:text-3xl font-black text-[#2c4c38] tracking-wide px-4 uppercase animate-bounce leading-tight">
            Gans toll, weiter geht's!
        </h1>
    </div>

    <script>
        // --- 1. RÄTSEL-DATENBANK ---
        const puzzleDatabase = [
            {
                image: "raetsel1.jpg", 
                question: "An welcher berühmten Hamburger Alster-Brücke startet unsere heute Tour?",
                answers: ["Lombardsbrücke", "Lombardbruecke", "Lombard", "Lombardsbruecke"], 
                tip1: "💡 Tipp 1: Sie trennt die Binnenalster von der Außenalster.",
                tip2: "💡 Tipp 2: Der Name fängt mit 'Lombard...' an.",
                solution: "🔓 Lösung: Die richtige Antwort ist 'Lombardsbrücke'. Schreib das einfach ins Feld, um weiterzugehen!"
            },
            {
                image: "raetsel2.jpg",
                question: "Wie viele goldene Gänse-Federn verstecken sich auf dem alten Marktplatz?",
                answers: ["3", "drei"],
                tip1: "💡 Tipp 1: Schau mal ganz genau an den Beinen der Statuen nach.",
                tip2: "💡 Tipp 2: Es ist eine ungerade Zahl kleiner als 5.",
                solution: "🔓 Lösung: Es sind exakt '3' Federn. Tippe die Zahl ein!"
            }
        ];

        // --- 2. SPIELSTAND-VARIABLEN ---
        let currentPuzzleIndex = 0;
        let wrongAttempts = 0;
        let introStep = 1; // Trackt den Fortschritt im Intro-Chat
        const chatContainer = document.getElementById('chat-container');

        // --- 3. SEITEN-NAVIGATIONS-FUNKTIONEN ---
        function showView(viewId) {
            document.getElementById('view-start').classList.add('view-hidden');
            document.getElementById('view-animation').classList.add('view-hidden');
            document.getElementById('view-intro').classList.add('view-hidden');
            document.getElementById('view-puzzle').classList.add('view-hidden');
            document.getElementById('view-success').classList.add('view-hidden');
            document.getElementById(viewId).classList.remove('view-hidden');
        }

        // --- 4. ANIMATIONS- UND INTRO-LOGIK ---

        function startFirstAnimation() {
            // Zeigt die Animations-Ansicht
            showView('view-animation');
            
            // Setzt den Text für den ersten Start
            document.getElementById('animation-text').innerText = "Bereit für deine Schatzsuche?";
            
            // Nach einer kurzen Verzögerung (Dauer der Animation/des GIF), zeige den Button
            setTimeout(() => {
                document.getElementById('animation-text-box').classList.add('view-hidden');
                document.getElementById('btn-intro-continue').classList.remove('view-hidden');
            }, 3000); // Zeige den Button nach 3 Sekunden
        }

        function showIntroView() {
            showView('view-intro');
            
            // Verhindert Doppelladen falls man zurückgeht
            if (chatContainer.children.length === 0) {
                // Die erste Nachricht der Gans wird mit Lade-Punkten getriggert
                triggerGooseTypingAndShowMessage("...und Happy Birthday! Ich bin die Anleitungs-Gans und schicke dich heute los auf deine Geburtstags-Reise. Bevor es losgeht, habe ich ein paar Regeln für dich. Bist du bereit, die zu hören?", 2500);
            }
        }

        // Hilfsfunktion: Zeigt Lade-Punkte an und ersetzt sie nach Verzögerung durch die echte Nachricht
        function triggerGooseTypingAndShowMessage(messageText, delay = 2000) {
            // 1. Punkte-Blase erstellen
            const typingBubble = document.createElement('div');
            typingBubble.id = "typing-indicator";
            // 'whitespace-nowrap' verhindert den Zeilenumbruch, 'w-auto' passt die Breite an
            typingBubble.className = "bg-white border border-[#b2cfb6] rounded-2xl rounded-tl-none px-5 py-3 text-slate-400 font-black shadow-sm w-auto whitespace-nowrap animate-pulse self-start my-1";
            typingBubble.innerText = "• • •";
            chatContainer.appendChild(typingBubble);
            chatContainer.scrollTop = chatContainer.scrollHeight; // Zum Ende scrollen

            // 2. Nach Verzögerung Punkte entfernen und Nachricht anzeigen
            setTimeout(() => {
                const indicator = document.getElementById('typing-indicator');
                if (indicator) indicator.remove(); // Punkte entfernen
                
                const gooseBubble = document.createElement('div');
                gooseBubble.className = "bg-white border border-[#b2cfb6] rounded-2xl rounded-tl-none p-4 text-[#2c4c38] font-medium shadow-sm max-w-[85%] self-start my-1 animate-fade-in";
                gooseBubble.innerText = messageText;
                
                chatContainer.appendChild(gooseBubble);
                chatContainer.scrollTop = chatContainer.scrollHeight; // Zum Ende scrollen
            }, delay);
        }

        function handleIntroResponse() {
            const inputField = document.getElementById('intro-input');
            const userInput = inputField.value.trim();

            if (userInput === "") return;

            // 1. User-Antwort in den Chat einfügen
            const userBubble = document.createElement('div');
            userBubble.className = "bg-[#2c4c38] text-white rounded-2xl rounded-tr-none p-4 text-sm font-medium shadow-sm max-w-[85%] self-end my-1 animate-fade-in";
            userBubble.innerText = userInput;
            chatContainer.appendChild(userBubble);
            
            // Input leeren und scrollen
            inputField.value = "";
            chatContainer.scrollTop = chatContainer.scrollHeight;

            const normalizedInput = userInput.toLowerCase();
            
            // Logik-Prüfung basierend auf dem aktuellen Schritt im Intro
            if (introStep === 1) {
                //luca sagt "ja"
                if (normalizedInput.includes('ja') || normalizedInput.includes('yes')) {
                    introStep = 2; // Nächster Schritt
                    // Gans tippt die Regeln
                    triggerGooseTypingAndShowMessage("Okay, dann kommen hier deine Spielregeln:\n\n1. Schau dich an den Orten gut um.\n2. Tippe deine Antworten ohne Hektik ein.\n3. Wenn du mal feststeckst, helfen dir die Tipps weiter!\n\nAlles verstanden? Dann tippe nochmal kurz 'Ja', um das erste Rätsel zu starten!", 3000);
                } else {
                    // Fallback, falls Luca nicht "ja" sagt
                    triggerGooseTypingAndShowMessage("Hehe, es gibt kein Zurück! 😉 Sag einfach 'Ja', wenn du bereit für die Regeln bist!", 2000);
                }
            } else if (introStep === 2) {
                //luca sagt "ja" zu den Regeln
                if (normalizedInput.includes('ja') || normalizedInput.includes('yes')) {
                    // Überleitung zum ersten Rätsel
                    setTimeout(() => loadPuzzle(), 1000);
                } else {
                    // Fallback
                    triggerGooseTypingAndShowMessage("Gans locker! Schreib mir einfach kurz 'Ja', sobald es wirklich losgehen kann.", 2000);
                }
            }
        }

        // --- 5. RÄTSEL-STEUERUNG ---
        function loadPuzzle() {
            // Prüfen, ob noch Rätsel übrig sind
            if (currentPuzzleIndex >= puzzleDatabase.length) {
                alert("Herzlichen Glückwunsch! Luca, du hast alle Rätsel von 'Gans Hamburg' gelöst! 🥳 Dein Schatz wartet am Ziel!");
                showView('view-start'); // Zum Start zurückkehren
                currentPuzzleIndex = 0; // Spielstand zurücksetzen
                introStep = 1; // Intro zurücksetzen
                chatContainer.innerHTML = ''; // Chat leeren
                return;
            }

            const currentPuzzle = puzzleDatabase[currentPuzzleIndex];
            
            // Rätsel-Daten in die Oberfläche laden
            document.getElementById('puzzle-progress').innerText = `Rätsel ${currentPuzzleIndex + 1} von ${puzzleDatabase.length}`;
            document.getElementById('puzzle-image').src = currentPuzzle.image;
            document.getElementById('puzzle-question').innerText = currentPuzzle.question;
            
            // Input und Feedback zurücksetzen
            document.getElementById('puzzle-input').value = "";
            const feedbackBox = document.getElementById('feedback-box');
            feedbackBox.classList.add('hidden');
            feedbackBox.innerText = "";
            wrongAttempts = 0; // Falsche Versuche für dieses Rätsel zurücksetzen

            showView('view-puzzle');
        }

        function checkAnswer() {
            const userInput = document.getElementById('puzzle-input').value.trim().toLowerCase();
            const currentPuzzle = puzzleDatabase[currentPuzzleIndex];
            const feedbackBox = document.getElementById('feedback-box');

            if (userInput === "") return;

            // Prüfen, ob die Antwort korrekt ist (ignoriert Groß-/Kleinschreibung)
            const isCorrect = currentPuzzle.answers.map(ans => ans.toLowerCase()).includes(userInput);

            if (isCorrect) {
                // Erfolgs-Überblendung zeigen
                showView('view-success');
                // Nach kurzer Zeit das nächste Rätsel laden
                setTimeout(() => {
                    currentPuzzleIndex++; // Zum nächsten Rätsel springen
                    loadPuzzle();
                }, 1500);

            } else {
                // Falsche Antwort: Feedback geben
                wrongAttempts++;
                feedbackBox.classList.remove('hidden');

                // Basierend auf der Anzahl der falschen Versuche Tipps anzeigen
                if (wrongAttempts === 1) {
                    feedbackBox.innerText = currentPuzzle.tip1;
                } else if (wrongAttempts === 2) {
                    feedbackBox.innerText = currentPuzzle.tip2;
                } else {
                    feedbackBox.innerText = currentPuzzle.solution;
                }
            }
        }
        
        // Listener für Enter-Taste im Intro-Chat, um die Antwort abzugeben
        document.getElementById('intro-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                handleIntroResponse();
            }
        });
        
        // Listener für Enter-Taste im Rätsel-Input, um die Antwort zu prüfen
        document.getElementById('puzzle-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });
    </script>
</body>
</html>
