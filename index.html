<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gans Hamburg - Die Schnitzeljagd</title>
    <!-- Tailwind CSS für die Gestaltung -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        /* Erzwungene Vollbild-Ansicht ohne Scrollen für mobile Displays */
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f2eb; /* Pastell-Beige */
        }

        /* Hintergrundbild-Verhalten: Cover & Zentriert */
        .bg-full-cover {
            background-image: url('Design Gans Hamburg 1.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            width: 100%;
            height: 100%;
        }

        /* Nützliche CSS-Klassen für weiche Übergänge */
        .view-hidden {
            display: none !important;
        }
        
        .flex-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <!-- ================================================================= -->
    <!-- ANSICHT 1: STARTBILDSCHIRM                                        -->
    <!-- ================================================================= -->
    <div id="view-start" class="bg-full-cover flex-center relative">
        <!-- 
          Anpassungen laut Wunsch:
          - Kein Rahmen (border-none)
          - Keine gerundeten Ecken (rounded-none)
          - Zeichenabstand auf -40 (entspricht im Web ca. letter-spacing: -0.04em)
          - In Beige gehalten (bg-[#e3ded2] als harmonisches Beige)
        -->
        <button onclick="startGame()" 
                style="letter-spacing: -0.04em;"
                class="px-12 py-5 bg-[#e3ded2] text-[#2c4c38] font-bold text-2xl rounded-none border-none shadow-lg uppercase active:scale-95 transition-transform">
            START
        </button>
    </div>

    <!-- ================================================================= -->
    <!-- ANSICHT 2: ANIMATIONS-SCREEN (Vollflächig ohne Rahmen)            -->
    <!-- ================================================================= -->
    <div id="view-animation" class="view-hidden w-full h-full bg-[#f5f2eb] relative">
        <!-- Das Bild füllt nun das komplette Display aus und schneidet Ränder via object-cover sauber ab -->
        <img id="animation-frame" src="goose_anim_1.png" alt="Gans Animation" class="w-full h-full object-cover">
        
        <!-- Der Hinweistext liegt nun dezent absolut über dem Bild am unteren Rand -->
        <div class="absolute bottom-10 left-0 w-full text-center">
            <p class="text-[#2c4c38] font-bold text-lg tracking-wide animate-pulse bg-[#f5f2eb]/80 inline-block px-4 py-2 rounded-full shadow-sm">
                Los geht's!
            </p>
        </div>
    </div>

    <!-- ================================================================= -->
    <!-- ANSICHT 3: RÄTSEL-SCREEN                                          -->
    <!-- ================================================================= -->
    <div id="view-puzzle" class="view-hidden w-full h-full bg-[#f5f2eb] flex flex-col justify-between p-6">
        
        <!-- Oberer Bereich: Titel und Bild -->
        <div class="w-full flex flex-col items-center">
            <div class="w-full text-center py-2 mb-2">
                <span id="puzzle-progress" class="text-xs font-bold tracking-wider text-[#2c4c38] uppercase bg-[#e3ded2] px-3 py-1 rounded-full">Rätsel 1 von 3</span>
            </div>
            
            <!-- Quadratischer Bildplatzhalter -->
            <div class="w-full max-w-[320px] aspect-square bg-white border-4 border-[#b2cfb6] rounded-xl shadow-inner overflow-hidden flex items-center justify-center">
                <img id="puzzle-image" src="placeholder.png" alt="Rätsel Bild" class="w-full h-full object-cover">
            </div>
        </div>

        <!-- Mittlerer Bereich: Frage, Input und Tipps -->
        <div class="w-full flex-1 flex flex-col justify-center my-4 max-w-md mx-auto space-y-4">
            <!-- Die Frage -->
            <p id="puzzle-question" class="text-[#2c4c38] font-semibold text-lg text-center px-2 leading-relaxed">
                Hier steht die Rätselfrage?
            </p>

            <!-- Antwortfeld -->
            <div class="w-full">
                <input id="puzzle-input" type="text" placeholder="Deine Antwort..." class="w-full bg-white border-2 border-[#b2cfb6] rounded-xl px-4 py-3 text-center text-lg text-slate-800 focus:outline-none focus:border-[#2c4c38] shadow-sm">
            </div>

            <!-- Dynamische Box für Tipps und Auflösungen -->
            <div id="feedback-box" class="w-full bg-[#faefe0] border border-[#e6d5bd] rounded-xl p-3 text-center text-sm text-[#7c5e39] font-medium hidden">
                <!-- Text wird per JS befüllt -->
            </div>
        </div>

        <!-- Unterer Bereich: Bestätigungsbutton -->
        <div class="w-full max-w-md mx-auto pb-4">
            <button onclick="checkAnswer()" class="w-full py-4 bg-[#2c4c38] text-white font-bold text-lg rounded-xl shadow-md active:scale-[0.98] transition-transform uppercase tracking-wider">
                Gans sicher!
            </button>
        </div>
    </div>

    <!-- ================================================================= -->
    <!-- ANSICHT 4: ERFOLGS-SCREEN                                         -->
    <!-- ================================================================= -->
    <div id="view-success" class="view-hidden w-full h-full bg-[#b2cfb6] flex-center p-6 text-center">
        <h1 class="text-2xl md:text-3xl font-black text-[#2c4c38] tracking-wide px-4 uppercase animate-bounce leading-tight">
            Gans toll, weiter geht's!
        </h1>
    </div>

    <!-- ================================================================= -->
    <!-- JAVASCRIPT LOGIK & DATENBANK                                      -->
    <!-- ================================================================= -->
    <script>
        // --- 1. RÄTSEL-DATENBANK ---
        const puzzleDatabase = [
            {
                image: "raetsel1.jpg", 
                question: "An welcher berühmten Hamburger Alster-Brücke startet unsere heutige Tour?",
                answers: ["Lombardsbrücke", "Lombardbruecke", "Lombard", "Lombardsbruecke"], 
                tip1: "💡 Tipp 1: Sie trennt die Binnenalster von der Außenalster.",
                tip2: "💡 Tipp 2: Der Name fängt mit 'Lombard...' an.",
                solution: "🔓 Lösung: Die richtige Antwort ist 'Lombardsbrücke'. Schreib das einfach ins Feld, um weiterzugehen!"
            },
            {
                image: "raetsel2.jpg",
                question: "Wie viele goldene Gänse-Federn verstecken sich auf dem alten Marktplatz?",
                answers: ["3", "drei"],
                tip1: "💡 Tipp 1: Schau mal ganz genau an den Beinen der Statuen nach.",
                tip2: "💡 Tipp 2: Es ist eine ungerade Zahl kleiner als 5.",
                solution: "🔓 Lösung: Es sind exakt '3' Federn. Tippe die Zahl ein!"
            }
        ];

        // --- 2. VARIABLEN FÜR DEN SPIELSTAND ---
        let currentPuzzleIndex = 0;
        let wrongAttempts = 0;
        let animationPreloaded = false;
        const totalFrames = 19;
        const animationImages = [];

        // --- 3. ANIMATION PRELOADER ---
        function preloadGooseAnimation() {
            for (let i = 1; i <= totalFrames; i++) {
                const img = new Image();
                img.src = `goose_anim_${i}.png`;
                animationImages.push(img);
            }
            animationPreloaded = true;
        }
        preloadGooseAnimation();

        // --- 4. SEITEN-NAVIGATIONS-FUNKTIONEN ---
        function showView(viewId) {
            document.getElementById('view-start').classList.add('view-hidden');
            document.getElementById('view-animation').classList.add('view-hidden');
            document.getElementById('view-puzzle').classList.add('view-hidden');
            document.getElementById('view-success').classList.add('view-hidden');
            document.getElementById(viewId).classList.remove('view-hidden');
        }

        // --- 5. ANIMATIONS-ABLAUF (1,5 Sekunden für 19 Frames) ---
        function runAnimation(callbackFunction) {
            showView('view-animation');
            
            let currentFrame = 1;
            const imgElement = document.getElementById('animation-frame');
            const frameDuration = 1500 / totalFrames; 
            
            const interval = setInterval(() => {
                currentFrame++;
                if (currentFrame <= totalFrames) {
                    imgElement.src = `goose_anim_${currentFrame}.png`;
                } else {
                    clearInterval(interval);
                    callbackFunction();
                }
            }, frameDuration);
        }

        // --- 6. SPIELSTEUERUNG ---
        function startGame() {
            runAnimation(() => {
                loadPuzzle();
            });
        }

        function loadPuzzle() {
            if (currentPuzzleIndex >= puzzleDatabase.length) {
                alert("Herzlichen Glückwunsch! Ihr habt alle Rätsel von 'Gans Hamburg' gelöst! 🥳");
                showView('view-start');
                currentPuzzleIndex = 0;
                return;
            }

            const currentPuzzle = puzzleDatabase[currentPuzzleIndex];
            
            document.getElementById('puzzle-progress').innerText = `Rätsel ${currentPuzzleIndex + 1} von ${puzzleDatabase.length}`;
            document.getElementById('puzzle-image').src = currentPuzzle.image;
            document.getElementById('puzzle-question').innerText = currentPuzzle.question;
            
            document.getElementById('puzzle-input').value = "";
            const feedbackBox = document.getElementById('feedback-box');
            feedbackBox.classList.add('hidden');
            feedbackBox.innerText = "";
            wrongAttempts = 0;

            showView('view-puzzle');
        }

        function checkAnswer() {
            const userInput = document.getElementById('puzzle-input').value.trim().toLowerCase();
            const currentPuzzle = puzzleDatabase[currentPuzzleIndex];
            const feedbackBox = document.getElementById('feedback-box');

            if (userInput === "") return;

            const isCorrect = currentPuzzle.answers.map(ans => ans.toLowerCase()).includes(userInput);

            if (isCorrect) {
                showView('view-success');
                setTimeout(() => {
                    currentPuzzleIndex++; 
                    runAnimation(() => {
                        loadPuzzle();
                    });
                }, 1500);

            } else {
                wrongAttempts++;
                feedbackBox.classList.remove('hidden');

                if (wrongAttempts === 1) {
                    feedbackBox.innerText = currentPuzzle.tip1;
                } else if (wrongAttempts === 2) {
                    feedbackBox.innerText = currentPuzzle.tip2;
                } else {
                    feedbackBox.innerText = currentPuzzle.solution;
                }
            }
        }
    </script>
</body>
</html>
